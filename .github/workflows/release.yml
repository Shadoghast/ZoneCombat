name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stamp version + URLs into module.json
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DOWNLOAD="https://github.com/${GITHUB_REPOSITORY}/releases/download/v${VERSION}/module.zip"
          MANIFEST="https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/module.json"
          jq --arg v "$VERSION" --arg d "$DOWNLOAD" --arg m "$MANIFEST" \
            '.version = $v | .download = $d | .manifest = $m' \
            module.json > module.json.tmp && mv module.json.tmp module.json
          echo "--- stamped module.json ---"
          cat module.json

      - name: Package module
        run: |
          zip -r module.zip . \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude ".claude/*" \
            --exclude "*.md" \
            --exclude "docs/*" \
            --exclude "release-assets/*"

      - name: Write release notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          cat > release-notes.md <<NOTES
          ## Zone Combat ${TAG}

          ### Install / update in Foundry

          Paste this manifest URL into Foundry's *Install Module* dialog:

              https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/module.json

          ### Direct download

          [\`module.zip\`](https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/module.zip)

          > Ignore the auto-generated **Source code (zip / tar.gz)** archives below — \`module.zip\` is the real package.
          NOTES

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            module.zip module.json \
            --repo "${GITHUB_REPOSITORY}" \
            --title "Zone Combat ${GITHUB_REF_NAME}" \
            --notes-file release-notes.md
